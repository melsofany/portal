kind = "web"
previewPath = "/"
title = "ALKHEDIVI Portal"
version = "1.0.0"
id = "artifacts/company-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25341

[services.development]
run = "pnpm --filter @workspace/company-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/company-app", "run", "build" ]
publicDir = "artifacts/company-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25341"
BASE_PATH = "/"
